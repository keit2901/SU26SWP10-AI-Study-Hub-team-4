name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 6 */3 * *'  # 06:00 UTC every 3 days
  workflow_dispatch:        # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Warning: unexpected status $STATUS"
          fi

      - name: Query health check
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Accept: application/json" | head -c 200
